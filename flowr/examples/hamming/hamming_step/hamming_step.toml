function = "hamming_step"
description = "Extract the next Hamming number and generate new candidates"
source = "hamming_step.rs"
docs = "hamming_step.md"
type = "rust"

[[input]]
name = "candidates" # sorted array of candidate Hamming numbers
type = "array/number"

[[output]]
name = "next" # the next Hamming number (minimum candidate)
type = "number"

[[output]]
name = "candidates" # updated sorted candidates for loopback
type = "array/number"
