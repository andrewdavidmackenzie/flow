[package]
name = "hamming_step"
version = "0.1.0"
authors = ["Andrew Mackenzie <andrew@mackenzie-serres.net>"]
edition = "2021"

[lib]
name = "hamming_step"
crate-type = ["cdylib"]
path = "hamming_step.rs"

[profile.release]
debug = false
lto = true
codegen-units = 1
opt-level = 's'
panic = 'abort'
strip = "debuginfo"

[dependencies]
flowcore = {path = "../../../../flowcore", version = "1"}
flowmacro = {path = "../../../../flowmacro", version = "1"}
serde_json = { version = "1.0", default-features = false }

[workspace]
exclude = ["../../..", ".."]
