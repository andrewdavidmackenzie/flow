flow = "weather-station"
docs = "DESCRIPTION.md"

# Read individual temperature values from stdin (one per line)
[[process]]
source = "context://stdio/readline"
input.prompt = { always = "" }

# --- Running minimum ---
[[process]]
alias = "min"
source = "lib://flowstdlib/data/min"
input.partial = { once = 99999 }

[[connection]]
from = "readline/json"
to = "min/value"

[[connection]]
from = "min/partial"
to = "min/partial"

[[process]]
alias = "label_min"
source = "lib://flowstdlib/data/append"
input.s1 = { always = "Min: " }

[[connection]]
from = "min/partial"
to = "label_min/s2"

# --- Running maximum ---
[[process]]
alias = "max"
source = "lib://flowstdlib/data/max"
input.partial = { once = -99999 }

[[connection]]
from = "readline/json"
to = "max/value"

[[connection]]
from = "max/partial"
to = "max/partial"

[[process]]
alias = "label_max"
source = "lib://flowstdlib/data/append"
input.s1 = { always = "Max: " }

[[connection]]
from = "max/partial"
to = "label_max/s2"

# --- Running average (sum / count) ---
[[process]]
alias = "avg"
source = "lib://flowstdlib/data/avg"
input.partial_sum = { once = 0 }
input.partial_count = { once = 0 }

[[connection]]
from = "readline/json"
to = "avg/value"

[[connection]]
from = "avg/partial_sum"
to = "avg/partial_sum"

[[connection]]
from = "avg/partial_count"
to = "avg/partial_count"

[[process]]
alias = "mean"
source = "lib://flowstdlib/math/divide"

[[connection]]
from = "avg/partial_sum"
to = "mean/dividend"

[[connection]]
from = "avg/partial_count"
to = "mean/divisor"

[[process]]
alias = "label_mean"
source = "lib://flowstdlib/data/append"
input.s1 = { always = "Mean: " }

[[connection]]
from = "mean/result"
to = "label_mean/s2"

# --- Reading count ---
[[process]]
source = "lib://flowstdlib/data/count"
input.count = { once = 0 }

[[connection]]
from = "readline/json"
to = "count/data"

[[connection]]
from = "count"
to = "count/count"

[[process]]
alias = "label_count"
source = "lib://flowstdlib/data/append"
input.s1 = { always = "Count: " }

[[connection]]
from = "count"
to = "label_count/s2"

# --- All stats to stdout ---
[[process]]
source = "context://stdio/stdout"

[[connection]]
from = "label_min"
to = "stdout"

[[connection]]
from = "label_max"
to = "stdout"

[[connection]]
from = "label_mean"
to = "stdout"

[[connection]]
from = "label_count"
to = "stdout"

# --- Moving chart of mean values (updated on each reading) ---
[[process]]
alias = "history"
source = "lib://flowstdlib/data/accumulate"
input.partial = { once = [] }
input.chunk_size = { always = 16 }

[[connection]]
from = "mean/result"
to = "history/values"

[[connection]]
from = "history/partial"
to = "history/partial"

# Render batch as a time series chart (internally shows last 256 values)
[[process]]
alias = "chart"
source = "lib://flowstdlib/charts/time_series"

[[connection]]
from = "history/chunk"
to = "chart/values"

# Write chart image
[[process]]
source = "context://image/image_write"
input.width = { always = 256 }
input.filename = { always = "mean_trend.png" }

[[connection]]
from = "chart/grid"
to = "image_write/grid"
