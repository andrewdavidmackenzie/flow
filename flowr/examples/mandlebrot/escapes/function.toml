[package]
name = "escapes"
version = "0.11.0"
authors = ["Andrew Mackenzie <andrew@mackenzie-serres.net>"]
edition = "2021"

[lib]
name = "escapes"
crate-type = ["cdylib"]
path = "escapes.rs"

[profile.release]
debug = false
lto = true
codegen-units = 1
opt-level = 'z' # Optimize for size
panic = 'abort' # About unwinding code
strip = true

[dependencies]
flowcore = {path = "../../../../flowcore", version = "1"}
flowmacro = {path = "../../../../flowmacro", version = "1"}
serde_json = { version = "1.0", default-features = false }
num = "0.4.0"

[workspace]
exclude = ["../../..", ".."]