function = "histogram"
description = "Compute histogram and derived statistics from a flat array of pixel values"
source = "histogram.rs"
docs = "histogram.md"
type = "rust"

[[input]]
name = "pixels" # flat array of grayscale values (0-255)
type = "array/number"

[[output]]
name = "min" # minimum brightness value present
type = "number"

[[output]]
name = "max" # maximum brightness value present
type = "number"

[[output]]
name = "average" # average brightness
type = "number"

[[output]]
name = "count" # total pixel count
type = "number"

[[output]]
name = "bins" # 256-element histogram array
type = "array/number"

[[output]]
name = "summary" # formatted string: "min=N max=N avg=N count=N"
type = "string"
