function = "contrast_stretch"
description = "Apply contrast stretching to an array of pixel values using min/max range"
source = "contrast_stretch.rs"
docs = "contrast_stretch.md"
type = "rust"

[[input]]
name = "pixels" # flat array of grayscale values
type = "array/number"

[[input]]
name = "min" # minimum value for stretch range
type = "number"

[[input]]
name = "max" # maximum value for stretch range
type = "number"

[[input]]
name = "width" # image width for reshaping to 2D grid
type = "number"

[[output]]
name = "grid" # stretched pixels as 2D grid (array/array/number)
type = "array/array/number"
