flow = "pixel_stretch"

# Contrast stretch a single pixel value using min/max range.
# Formula: new_pixel = (pixel - min) * 255 / (max - min)
# All math done with flowstdlib — no provided functions.

[[input]]
name = "pixel"
type = "number"

[[input]]
name = "min"
type = "number"

[[input]]
name = "max"
type = "number"

[[output]]
type = "number"

# Step 1: pixel - min
[[process]]
alias = "offset"
source = "lib://flowstdlib/math/subtract"

[[connection]]
from = "input/pixel"
to = "offset/i1"

[[connection]]
from = "input/min"
to = "offset/i2"

# Step 2: (pixel - min) * 255
[[process]]
alias = "scale"
source = "lib://flowstdlib/math/multiply"
input.i2 = { always = 255 }

[[connection]]
from = "offset"
to = "scale/i1"

# Step 3: max - min (the range)
[[process]]
alias = "range"
source = "lib://flowstdlib/math/subtract"

[[connection]]
from = "input/max"
to = "range/i1"

[[connection]]
from = "input/min"
to = "range/i2"

# Step 4: scaled / range
[[process]]
alias = "stretch"
source = "lib://flowstdlib/math/divide"

[[connection]]
from = "scale"
to = "stretch/dividend"

[[connection]]
from = "range"
to = "stretch/divisor"

[[connection]]
from = "stretch/result"
to = "output"
