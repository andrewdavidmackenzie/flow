flow = "composites"

[[input]]
name = "limit"
type = "number"

[[output]]
name = "composites"
type = "number"

# Generate divisors: 2..sqrt(limit)
[[process]]
source = "lib://flowstdlib/math/sqrt"
[[connection]]
from = "input/limit"
to = "sqrt"

[[process]]
alias = "divisors"
source = "lib://flowstdlib/math/sequence"
input.start = {once = 2}
input.step = {once = 1}
[[connection]]
from = "sqrt"
to = "divisors/limit"

# start = divisor * 2
[[process]]
alias = "make-start"
source = "lib://flowstdlib/math/multiply"
input.i2 = {always = 2}
[[connection]]
from = "divisors/number"
to = "make-start/i1"

# Replicate limit per divisor: multiply divisor by 0, add limit with self-loopback
[[process]]
alias = "zero-divisor"
source = "lib://flowstdlib/math/multiply"
input.i2 = {always = 0}
[[connection]]
from = "divisors/number"
to = "zero-divisor/i1"

[[process]]
alias = "make-limit"
source = "lib://flowstdlib/math/add"
[[connection]]
from = "zero-divisor"
to = "make-limit/i1"
[[connection]]
from = "input/limit"
to = "make-limit/i2"
[[connection]]
from = "make-limit"
to = "make-limit/i2"

# Inner sequence: generate composites
[[process]]
alias = "composite-sequence"
source = "lib://flowstdlib/math/sequence"

[[connection]]
from = "make-start"
to = "composite-sequence/start"

[[connection]]
from = "divisors/number"
to = "composite-sequence/step"

[[connection]]
from = "make-limit"
to = "composite-sequence/limit"

[[connection]]
from = "composite-sequence/number"
to = "output/composites"
