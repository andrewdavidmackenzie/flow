[package]
name = "fft_compute"
version = "0.1.0"
edition = "2021"

[lib]
name = "fft_compute"
crate-type = ["cdylib"]
path = "fft_compute.rs"

[profile.release]
debug = false
lto = true
codegen-units = 1
opt-level = 's'
panic = 'abort'
strip = "debuginfo"

[dependencies]
flowcore = {path = "../../../../flowcore", version = "1"}
flowmacro = {path = "../../../../flowmacro", version = "1"}
serde_json = { version = "1.0", default-features = false, features = ["alloc"] }

[workspace]
exclude = ["../../..", ".."]
