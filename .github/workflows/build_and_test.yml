name: Build and Test with Coverage

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule: # Build every day at 5PM UTC
    - cron: '0 17 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  test-book-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: install mdbook
        run: curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.27/mdbook-v0.4.27-x86_64-unknown-linux-gnu.tar.gz | tar -xz --directory=$HOME/.cargo/bin
      - name: install link checker
        run: |
          curl -sSL https://github.com/Michael-F-Bryan/mdbook-linkcheck/releases/download/v0.7.7/mdbook-linkcheck.x86_64-unknown-linux-gnu.zip > mdbook-linkcheck.zip
          mkdir -p $HOME/.cargo/bin
          unzip mdbook-linkcheck.zip -d $HOME/.cargo/bin
          chmod +x $HOME/.cargo/bin/mdbook-linkcheck
          echo "PATH=$HOME/.cargo/bin:$PATH" >> "$GITHUB_ENV"
      - name: make book
        run: make book

  clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get -y install libzmq3-dev libgtk-3-dev
      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
      - name: run clippy
        run: cargo clippy --tests --no-deps --all-features --all-targets -- --warn clippy::pedantic --deny warnings

  features:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get -y install libzmq3-dev libgtk-3-dev
      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-all-features
        run: which cargo-build-all-features || cargo install cargo-all-features
      - name: Check all feature combinations
        run: cargo build-all-features

  # Build flowstdlib WASM once on Linux — output is cross-platform
  build-flowstdlib:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get -y install libzmq3-dev libssl-dev libgtk-3-dev
          ARCH=$(uname -m)
          BINARYEN_VERSION="version_129"
          wget https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-${ARCH}-linux.tar.gz
          tar -xvzf binaryen-${BINARYEN_VERSION}-${ARCH}-linux.tar.gz
          sudo cp binaryen-${BINARYEN_VERSION}/bin/* /bin/
          rm -rf binaryen-${BINARYEN_VERSION} binaryen-${BINARYEN_VERSION}-${ARCH}-linux.tar.gz

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo install tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: Linux-x86_64-cargo-tools-v1

      - name: InstallWasmTools
        run: |
          which wasm-gc || cargo install wasm-gc
          which wasm-snip || cargo install wasm-snip

      - name: cargo-build-flowc
        run: cargo build -p flowc

      - name: build-flowstdlib
        run: |
          target/debug/flowc -d -g -O flowstdlib
          echo "FLOWSTDLIB_DIR=$(target/debug/flowc --print-lib-dir)/flowstdlib" >> "$GITHUB_ENV"

      - name: upload-flowstdlib
        uses: actions/upload-artifact@v4
        with:
          name: flowstdlib
          path: ${{ env.FLOWSTDLIB_DIR }}
          retention-days: 1

  build-and-test:
    needs: build-flowstdlib
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-26, ubuntu-24.04, ubuntu-24.04-arm, windows-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: SetupEnv
        shell: bash
        run: |
          echo "PATH=$GITHUB_WORKSPACE/target/debug:$PATH" >> "$GITHUB_ENV"
          echo "CARGO_REGISTRIES_CRATES_IO_PROTOCOL=sparse" >> "$GITHUB_ENV"

      - name: EnableIncrementalOnWindows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CARGO_INCREMENTAL=1" >> "$GITHUB_ENV"
          if [ -f "/c/Program Files/LLVM/bin/lld-link.exe" ]; then
            echo "Using lld-link for faster linking"
            echo "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=C:/Program Files/LLVM/bin/lld-link.exe" >> "$GITHUB_ENV"
          else
            echo "lld-link not found, using default MSVC linker"
          fi

      - name: DisableWindowsDefenderScanning
        if: runner.os == 'Windows'
        shell: powershell
        run: Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE"

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Cache cargo install tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-tools-v1

      - name: InstallLinuxDependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get -y install libzmq3-dev libssl-dev lcov libgtk-3-dev weston

      - name: InstallMacDependencies
        if: runner.os == 'macOS'
        run: brew install zmq lcov

      - name: InstallWasmTools
        shell: bash
        run: |
          which wasm-gc || cargo install wasm-gc
          which wasm-snip || cargo install wasm-snip

      - name: ConfigureCoverage
        if: runner.os != 'Windows'
        run: |
          which grcov || cargo install grcov
          rustup component add llvm-tools-preview
          echo CARGO_INCREMENTAL=0 >> "$GITHUB_ENV"
          echo RUSTFLAGS="-C instrument-coverage" >> "$GITHUB_ENV"
          echo LLVM_PROFILE_FILE="flow-%p-%m.profraw" >> "$GITHUB_ENV"

      - name: cargo-build
        shell: bash
        run: cargo build

      - name: find-flow-lib-dir
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            FLOW_LIB=$(target/debug/flowc.exe --print-lib-dir)
          else
            FLOW_LIB=$(target/debug/flowc --print-lib-dir)
          fi
          mkdir -p "$FLOW_LIB/flowstdlib"
          echo "FLOW_LIB_DIR=$FLOW_LIB" >> "$GITHUB_ENV"

      - name: download-flowstdlib
        uses: actions/download-artifact@v4
        with:
          name: flowstdlib
          path: ${{ env.FLOW_LIB_DIR }}/flowstdlib/

      - name: build-flowrcli-context
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            export PATH="$CARGO_HOME/bin:$PATH"
            target/debug/flowc.exe flowr/src/bin/flowrcli
          else
            target/debug/flowc flowr/src/bin/flowrcli
          fi

      - name: build-flowrgui-context
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            export PATH="$CARGO_HOME/bin:$PATH"
            target/debug/flowc.exe flowr/src/bin/flowrgui
          else
            target/debug/flowc flowr/src/bin/flowrgui
          fi

      - name: StartHeadlessWayland
        if: runner.os == 'Linux'
        run: |
          export XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-/tmp}
          weston -Bheadless -Sweston &
          sleep 1
          echo "WAYLAND_DISPLAY=weston" >> "$GITHUB_ENV"
          echo "LIBGL_ALWAYS_SOFTWARE=1" >> "$GITHUB_ENV"
          echo "MESA_LOG_LEVEL=0" >> "$GITHUB_ENV"
          echo "EGL_LOG_LEVEL=fatal" >> "$GITHUB_ENV"
          echo "ICED_BACKEND=tiny-skia" >> "$GITHUB_ENV"
          echo "RUST_LOG=error,sctk_adwaita=off" >> "$GITHUB_ENV"
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"

      - name: test
        shell: bash
        timeout-minutes: ${{ runner.os == 'Windows' && 25 || 20 }}
        run: cargo test --features "online_tests"

      - name: test-examples
        shell: bash
        timeout-minutes: ${{ runner.os == 'Windows' && 20 || 15 }}
        run: cargo test --examples

      - name: UploadCoverage
        if: runner.os != 'Windows'
        run: |
          grcov . --binary-path target/debug/ -s . -t lcov --branch --ignore-not-existing --ignore "/*" -o lcov.info
          lcov --ignore-errors inconsistent --remove lcov.info 'target/debug/build/**' '**/errors.rs' '*tests/*' -o lcov.info
          bash <(curl -s https://codecov.io/bash) -f lcov.info
          rm -f lcov.info
