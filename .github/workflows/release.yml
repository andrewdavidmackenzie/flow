# Release workflow using cargo-packager
#
# Triggered when a GitHub Release is published.
# Builds binaries and packages for all supported platforms,
# compiles flowstdlib to WASM, and uploads everything to the release.
name: Release Bundle

on:
  release:
    types: [ published ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  build-and-bundle:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-26
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev libssl-dev binaryen cmake

      - name: Install armv7 cross-compilation toolchain
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install zmq binaryen openssl

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BINARYEN_VERSION="version_129"
          curl -sL "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-windows.tar.gz" -o binaryen.tar.gz
          tar -xzf binaryen.tar.gz
          cp binaryen-${BINARYEN_VERSION}/bin/* "$GITHUB_WORKSPACE/"
          echo "$GITHUB_WORKSPACE" >> "$GITHUB_PATH"
          rm -rf binaryen-${BINARYEN_VERSION} binaryen.tar.gz

      - name: Install WASM tools
        run: cargo install wasm-gc wasm-snip

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Cross-compile OpenSSL for armv7
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          curl -sL https://github.com/openssl/openssl/releases/download/openssl-3.4.1/openssl-3.4.1.tar.gz | tar xz
          cd openssl-3.4.1
          ./Configure linux-armv4 --cross-compile-prefix=arm-linux-gnueabihf- --prefix=$HOME/openssl-armv7 no-shared
          make -j$(nproc)
          make install_sw
          cd ..

      - name: Build release binaries
        run: cargo build --release --all-features --target ${{ matrix.target }}
        env:
          CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          CXX_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-g++
          OPENSSL_STATIC: ${{ matrix.target == 'armv7-unknown-linux-gnueabihf' && '1' || '' }}
          OPENSSL_DIR: ${{ matrix.target == 'armv7-unknown-linux-gnueabihf' && '/home/runner/openssl-armv7' || '' }}

      - name: Find and upload release binaries
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TARGET="${{ matrix.target }}"
          RELEASE_DIR="target/${TARGET}/release"

          # Create a directory for the archive
          mkdir -p staging

          # Copy binaries (platform-specific extensions)
          if [[ "$TARGET" == *"windows"* ]]; then
            EXT=".exe"
          else
            EXT=""
          fi

          FOUND=0
          for bin in flowc flowrcli flowrgui flowrex flowrdb flowedit; do
            if [ -f "${RELEASE_DIR}/${bin}${EXT}" ]; then
              cp "${RELEASE_DIR}/${bin}${EXT}" staging/
              echo "Found: ${bin}${EXT}"
              FOUND=$((FOUND + 1))
            fi
          done

          if [ "$FOUND" -eq 0 ]; then
            echo "::error::No binaries found in ${RELEASE_DIR}"
            exit 1
          fi
          echo "Total binaries found: ${FOUND}"

          # Bundle context definitions for runners
          for runner in flowrcli flowrgui; do
            CONTEXT_DIR="flowr/src/bin/${runner}/context"
            if [ -d "${CONTEXT_DIR}" ]; then
              mkdir -p "staging/runner/${runner}"
              cp -r "${CONTEXT_DIR}"/* "staging/runner/${runner}/"
              echo "Bundled context definitions for ${runner}"
            fi
          done

          # Bundle install script
          cp install.sh staging/ 2>/dev/null || true

          # Create archive
          cd staging
          if [[ "$TARGET" == *"windows"* ]]; then
            ARCHIVE="flow-${TAG}-${TARGET}.zip"
            7z a "../${ARCHIVE}" .
          else
            ARCHIVE="flow-${TAG}-${TARGET}.tar.gz"
            tar -czf "../${ARCHIVE}" .
          fi
          cd ..

          echo "Uploading ${ARCHIVE}"
          gh release upload "${TAG}" "${ARCHIVE}" --clobber

      - name: Package flowc (native installers)
        shell: bash
        continue-on-error: true
        run: cargo packager --release --target ${{ matrix.target }} --packages flowc --verbose

      - name: Package flowr (native installers)
        shell: bash
        continue-on-error: true
        run: cargo packager --release --target ${{ matrix.target }} --packages flowr --verbose

      - name: Package flowedit (native installers)
        shell: bash
        continue-on-error: true
        run: cargo packager --release --target ${{ matrix.target }} --packages flowedit --verbose

      - name: Upload native packages
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          for ext in deb AppImage dmg exe msi; do
            find target -name "*.${ext}" -type f 2>/dev/null | while read pkg; do
              echo "Uploading: ${pkg}"
              gh release upload "${TAG}" "${pkg}" --clobber || true
            done
          done

      - name: Compile flowstdlib to WASM (Linux x86_64 only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: target/${{ matrix.target }}/release/flowc -d -g -O flowstdlib

      - name: Upload flowstdlib tarball (Linux x86_64 only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mkdir -p flowstdlib-staging
          cp -r $HOME/.flow/lib/flowstdlib flowstdlib-staging/
          cp install-flowstdlib.sh flowstdlib-staging/
          cd flowstdlib-staging
          tar -cJf "flowstdlib-${TAG}.tar.xz" flowstdlib install-flowstdlib.sh
          cd ..
          gh release upload "${TAG}" "flowstdlib-staging/flowstdlib-${TAG}.tar.xz" --clobber
          gh release upload "${TAG}" install-flowstdlib.sh --clobber
          gh release upload "${TAG}" install-flow.sh --clobber

  build-and-publish-book:
    needs: [ build-and-bundle ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build book
        run: |
          sudo apt-get update && sudo apt-get -y install graphviz
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.27/mdbook-v0.4.27-x86_64-unknown-linux-gnu.tar.gz | tar -xz --directory=$HOME/.cargo/bin
          curl -sSL https://github.com/Michael-F-Bryan/mdbook-linkcheck/releases/download/v0.7.7/mdbook-linkcheck.x86_64-unknown-linux-gnu.zip > mdbook-linkcheck.zip
          mkdir -p $HOME/.cargo/bin
          unzip mdbook-linkcheck.zip -d $HOME/.cargo/bin
          chmod +x $HOME/.cargo/bin/mdbook-linkcheck
          echo "PATH=$HOME/.cargo/bin:$PATH" >> "$GITHUB_ENV"
          make book
      - name: Deploy book
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: target/html
